services:
  postgres:
    image: postgres:16-alpine
    container_name: football_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: football_prediction
      POSTGRES_USER: ${POSTGRES_USER:-football}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-football_pass}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-football} -d football_prediction"]
      interval: 10s
      timeout: 5s
      retries: 5
